<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>表のサンプル</title>

  <style>
    table {
      border-collapse: collapse;
      width: 60%;
      margin: 20px auto;
    }

    th, td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #dddddd;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center;">成績表</h2>

  <table>
    <tr>
      <th>名前</th>
      <th>数学</th>
      <th>英語</th>
      <th>理科</th>
    </tr>

    <tr>
      <td>田中</td>
      <td>85</td>
      <td>90</td>
      <td>88</td>
    </tr>

    <tr>
      <td>鈴木</td>
      <td>78</td>
      <td>82</td>
      <td>80</td>
    </tr>

    <tr>
      <td>佐藤</td>
      <td>92</td>
      <td>89</td>
      <td>95</td>
    </tr>
  </table>

</body>
</html>
